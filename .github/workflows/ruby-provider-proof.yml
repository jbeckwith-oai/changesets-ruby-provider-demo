name: Ruby provider proof

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      changesets_repository:
        description: Changesets repository to test
        required: true
        default: jbeckwith-oai/changesets
      changesets_ref:
        description: Changesets branch, tag, SHA, or PR ref to test
        required: true
        default: codex/ruby-version-provider

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    env:
      CHANGESETS_REPOSITORY: ${{ inputs.changesets_repository || 'jbeckwith-oai/changesets' }}
      CHANGESETS_REF: ${{ inputs.changesets_ref || 'codex/ruby-version-provider' }}

    steps:
      - name: Check out demo repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Changesets
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHANGESETS_REPOSITORY }}
          ref: ${{ env.CHANGESETS_REF }}
          path: changesets

      - name: Show proof target
        run: |
          echo "Testing $CHANGESETS_REPOSITORY at $CHANGESETS_REF"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Build Changesets
        working-directory: changesets
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run Ruby provider proof
        run: CHANGESETS_ROOT="$GITHUB_WORKSPACE/changesets" ./scripts/run-demo.sh
