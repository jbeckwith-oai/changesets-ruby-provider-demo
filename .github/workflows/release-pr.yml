name: Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out demo repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Changesets
        uses: actions/checkout@v4
        with:
          repository: jbeckwith-oai/changesets
          ref: codex/ruby-version-provider
          path: .changesets-checkout

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Changesets
        working-directory: .changesets-checkout
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

      - name: Create version pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: changeset-release/main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$RELEASE_BRANCH" origin/main

          node .changesets-checkout/packages/cli/bin.js status --output "$RUNNER_TEMP/changesets-status.json"
          node .changesets-checkout/packages/cli/bin.js version
          node .github/scripts/build-release-pr-body.mjs "$RUNNER_TEMP/changesets-status.json" "$RUNNER_TEMP/release-pr-body.md"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No release changes to commit."
            exit 0
          fi

          git add .
          git commit -m "Version Ruby gem"
          git push origin HEAD:"$RELEASE_BRANCH" --force

          if pr_number="$(gh pr view "$RELEASE_BRANCH" --json number --jq .number 2>/dev/null)"; then
            gh pr edit "$pr_number" --title "Version Ruby gem" --body-file "$RUNNER_TEMP/release-pr-body.md"
          else
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "Version Ruby gem" \
              --body-file "$RUNNER_TEMP/release-pr-body.md"
          fi
