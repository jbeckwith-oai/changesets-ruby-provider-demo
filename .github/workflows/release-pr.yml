name: Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out demo repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Changesets
        uses: actions/checkout@v4
        with:
          repository: jbeckwith-oai/changesets
          ref: codex/ruby-version-provider
          path: changesets

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Changesets
        working-directory: changesets
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

      - name: Create version pull request
        uses: changesets/action@v1
        with:
          version: node changesets/packages/cli/bin.js version
          title: Version Ruby gem
          commit: Version Ruby gem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
